name: Release online installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build online installer zip
        shell: pwsh
        run: .\scripts\build_online_installer.ps1 -SourceRef $env:GITHUB_REF_NAME

      - name: Build setup executable
        shell: pwsh
        run: .\scripts\build_installer_exe.ps1 -SourceRef $env:GITHUB_REF_NAME

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Select-String -Path "pyproject.toml" -Pattern '^version = "([^"]+)"$').Matches[0].Groups[1].Value
          $zip = "release\LocalSRT-OnlineInstaller-v$version.zip"
          $exe = "release\LocalSRT-Setup-v$version.exe"
          gh release create $env:GITHUB_REF_NAME $zip $exe `
            --title "Local SRT $env:GITHUB_REF_NAME" `
            --notes "Small online installers for Local SRT. Use Install-LocalSRT-Portable.cmd from the zip for a portable folder install. The installers download Python, ffmpeg, the selected CPU or NVIDIA GPU runtime, and download speech models later on first transcription."
